<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 电商智能客服</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>🛒 智能客服</h2>
    <button class="btn-new-chat" onclick="newSession()" title="新建会话">＋ 新会话</button>
  </div>
  <div class="sidebar-list" id="sessionList">
    <!-- 会话列表动态生成 -->
  </div>
  <div class="sidebar-footer">
    <div class="status-dot online"></div>
    <span>客服系统在线</span>
    <small style="color:#888">工作时段 9:00-22:00</small>
  </div>
</aside>

<!-- 主聊天区 -->
<main class="chat-main">
  <header class="chat-header">
    <div class="header-left">
      <h1 id="chatTitle">电商智能客服</h1>
      <p id="chatSubtitle">AI 助手在线，为您提供订单、商品、售后等全方位服务</p>
    </div>
    <div class="header-right">
      <div class="login-box" id="loginBox">
        <input type="tel" id="phoneInput" placeholder="输入手机号登录" maxlength="11" onkeydown="handlePhoneKey(event)" />
        <button class="btn-login" id="btnLogin" onclick="doLogin()">登录</button>
        <span class="login-status" id="loginStatus" style="display:none"></span>
        <button class="btn-logout" id="btnLogout" onclick="doLogout()" style="display:none">退出</button>
      </div>
    </div>
  </header>

  <div class="chat-messages" id="chatMessages">
    <div class="welcome-message">
      <div class="welcome-icon">🛒</div>
      <h2>欢迎来到电商智能客服</h2>
      <p>我可以帮您：</p>
      <div class="quick-actions">
        <button onclick="quickAsk('帮我查一下我的订单')">📦 查询订单</button>
        <button onclick="quickAsk('推荐一款降噪耳机')">🛍️ 商品推荐</button>
        <button onclick="quickAsk('如何申请退货？')">🔧 退换货</button>
        <button onclick="quickAsk('支持哪些支付方式？')">📋 常见问题</button>
      </div>
    </div>
  </div>

  <!-- 用户确认弹窗 -->
  <div class="approval-banner" id="approvalBanner" style="display:none">
    <div class="approval-content">
      <span>⚠️ 请确认此操作</span>
      <div class="approval-actions">
        <button class="btn-approve" onclick="handleApproval(true)">✅ 确认</button>
        <button class="btn-reject" onclick="handleApproval(false)">❌ 取消</button>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="chat-input-wrapper">
      <label class="btn-upload" title="上传图片（也可直接粘贴或拖拽）">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </label>
      <input
        type="text"
        id="chatInput"
        placeholder="输入问题，或粘贴/拖拽图片..."
        onkeydown="handleKeyDown(event)"
        onpaste="handlePaste(event)"
        autocomplete="off"
      />
      <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
    </div>
  </div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
